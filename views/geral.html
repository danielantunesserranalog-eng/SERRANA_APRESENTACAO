<div class="dashboard-grid">
    <div class="kpi-card" id="card-pbtc">
        <div id="bar-pbtc" class="farol-indicator"></div>
        <p class="nav-label">MÉDIA PBTC (TON)</p>
        <div class="kpi-value" id="val-pbtc">75.5 <span class="kpi-unit">ton</span></div>
        <p id="txt-pbtc" class="status-msg">Performance Ideal</p>
    </div>

    <div class="kpi-card">
        <div class="farol-indicator bg-verde"></div>
        <p class="nav-label">CICLO MÉDIO DE VIAGEM</p>
        <div class="kpi-value status-verde">02:45 <span class="kpi-unit">h/min</span></div>
        <p class="status-msg">Dentro da Meta</p>
    </div>
</div>

<script>
    // Lógica PBTC: < 74 Amarelo | 74-77.7 Verde | > 77.7 Vermelho
    const pbtc = 75.5; 
    const bar = document.getElementById('bar-pbtc');
    const val = document.getElementById('val-pbtc');
    
    if (pbtc < 74) {
        bar.className = 'farol-indicator bg-amarelo';
        val.className = 'kpi-value status-amarelo';
    } else if (pbtc >= 74 && pbtc <= 77.7) {
        bar.className = 'farol-indicator bg-verde';
        val.className = 'kpi-value status-verde';
    } else {
        bar.className = 'farol-indicator bg-vermelho';
        val.className = 'kpi-value status-vermelho';
    }
</script>
