<div class="dashboard-grid">
    <!-- Bloco 1: Indicadores Gerais -->
    <div class="kpi-card" style="grid-column: 1 / -1; border-left: 5px solid var(--primary);">
        <h3 class="nav-label" style="margin-bottom: 20px; color: var(--primary);"><i class="fas fa-edit"></i> LANÇAMENTO DIÁRIO DE INDICADORES - RH</h3>
        
        <div class="form-grid">
            <div class="input-group">
                <label style="display:block; margin-bottom: 8px; font-size: 0.8rem; color: var(--text-dim);">Total de Colaboradores (Headcount)</label>
                <input type="number" id="input-headcount" class="config-input" placeholder="Ex: 250">
            </div>
            <div class="input-group">
                <label style="display:block; margin-bottom: 8px; font-size: 0.8rem; color: var(--text-dim);">Total de Atestados</label>
                <input type="number" id="input-atestados" class="config-input" placeholder="Ex: 5">
            </div>
            <div class="input-group">
                <label style="display:block; margin-bottom: 8px; font-size: 0.8rem; color: var(--text-dim);">Total de Afastamentos</label>
                <input type="number" id="input-afastamentos" class="config-input" placeholder="Ex: 2">
            </div>
            <div class="input-group">
                <label style="display:block; margin-bottom: 8px; font-size: 0.8rem; color: var(--text-dim);">Processos de Admissão (Em andamento)</label>
                <input type="number" id="input-admissoes" class="config-input" placeholder="Ex: 3">
            </div>
            <div class="input-group">
                <label style="display:block; margin-bottom: 8px; font-size: 0.8rem; color: var(--text-dim);">Integrações Realizadas</label>
                <input type="number" id="input-integracoes" class="config-input" placeholder="Ex: 4">
            </div>
        </div>
    </div>

    <!-- Bloco 1.5: Murais de Comunicação RH e Calendário -->
    <div class="kpi-card" style="grid-column: 1 / -1; border-left: 5px solid #8b5cf6; margin-top: 10px;">
        <h3 class="nav-label" style="margin-bottom: 20px; color: #8b5cf6;"><i class="fas fa-chalkboard"></i> MURAIS DE COMUNICAÇÃO E EVENTOS</h3>

        <div class="form-grid" style="grid-template-columns: 1fr 1fr 1fr;">
            <!-- Caixas de Texto (Avisos, Liberações, Aniversariantes) -->
            <div class="input-group">
                <label style="display:block; margin-bottom: 8px; font-size: 0.8rem; color: var(--text-dim);">Avisos</label>
                <textarea id="input-avisos-rh" class="config-input" rows="3" placeholder="Avisos gerais do RH..."></textarea>
            </div>
            <div class="input-group">
                <label style="display:block; margin-bottom: 8px; font-size: 0.8rem; color: var(--text-dim);">Liberações Destra x Prazos</label>
                <textarea id="input-liberacoes-rh" class="config-input" rows="3" placeholder="Status das liberações e prazos do RH..."></textarea>
            </div>
            <div class="input-group">
                <label style="display:block; margin-bottom: 8px; font-size: 0.8rem; color: var(--text-dim);">Aniversariantes do Mês</label>
                <textarea id="input-aniversariantes-rh" class="config-input" rows="3" placeholder="Ex: Dia 05 - João, Dia 12 - Maria..."></textarea>
            </div>
            
            <!-- NOVO CONTROLE: GERADOR DE EVENTOS PARA O CALENDÁRIO -->
            <div class="input-group" style="grid-column: 1 / -1; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 8px; border: 1px solid var(--border);">
                <label style="display:block; margin-bottom: 12px; font-size: 0.9rem; color: var(--verde); font-weight: bold;"><i class="fas fa-calendar-plus"></i> Gerenciar Calendário de Eventos / Pagamentos</label>
                
                <div style="display: flex; gap: 15px; align-items: flex-end; flex-wrap: wrap; margin-bottom: 15px;">
                    <div style="flex: 1; min-width: 200px;">
                        <label style="font-size: 0.75rem; color: var(--text-dim); margin-bottom: 5px; display: block;">Selecione o Evento</label>
                        <select id="novo-evento-tipo" class="config-input">
                            <option value="PAGAMENTO MENSAL">PAGAMENTO MENSAL</option>
                            <option value="TICKET">TICKET</option>
                            <option value="ADIANTAMENTO">ADIANTAMENTO</option>
                            <option value="OUTRO">OUTRO (Digitar nome...)</option>
                        </select>
                    </div>
                    <div style="flex: 1; min-width: 150px;">
                        <label style="font-size: 0.75rem; color: var(--text-dim); margin-bottom: 5px; display: block;">Data do Evento</label>
                        <input type="date" id="novo-evento-data" class="config-input">
                    </div>
                    <button type="button" class="btn-salvar" style="padding: 14px 20px; background: var(--verde);" onclick="adicionarEventoCalendario()">
                        <i class="fas fa-plus"></i> Incluir no Calendário
                    </button>
                </div>
                
                <label style="font-size: 0.75rem; color: var(--text-dim); margin-bottom: 5px; display: block;">Lista Final de Eventos (Pode ser editada/apagada manualmente)</label>
                <textarea id="input-calendario-rh" class="config-input" rows="3" placeholder="Os eventos adicionados aparecerão aqui..."></textarea>
            </div>
        </div>

        <button class="btn-salvar" onclick="salvarDadosRH()" style="margin-top: 20px; background: #8b5cf6;">
            <i class="fas fa-save"></i> Salvar Indicadores e Murais no Banco
        </button>
        <span id="msg-rh" style="margin-left: 15px; font-weight: bold;"></span>
    </div>

    <!-- Bloco 2: Gestão de Vagas -->
    <div class="kpi-card" style="grid-column: 1 / -1; border-left: 5px solid var(--amarelo); margin-top: 10px;">
        <h3 class="nav-label" style="margin-bottom: 20px; color: var(--amarelo);"><i class="fas fa-briefcase"></i> GESTÃO DE VAGAS (RECRUTAMENTO E SELEÇÃO)</h3>
        
        <div class="form-grid" style="grid-template-columns: 2fr 2fr 1fr;">
            <div class="input-group">
                <label style="display:block; margin-bottom: 8px; font-size: 0.8rem; color: var(--text-dim);">Cargo / Função</label>
                <input type="text" id="vaga-cargo" class="config-input" placeholder="Ex: Motorista Tritrem">
            </div>
            <div class="input-group">
                <label style="display:block; margin-bottom: 8px; font-size: 0.8rem; color: var(--text-dim);">Setor</label>
                <input type="text" id="vaga-setor" class="config-input" placeholder="Ex: Operacional">
            </div>
            <div class="input-group">
                <label style="display:block; margin-bottom: 8px; font-size: 0.8rem; color: var(--text-dim);">Quantidade</label>
                <input type="number" id="vaga-qtd" class="config-input" placeholder="Ex: 2" min="1">
            </div>
        </div>
        
        <button class="btn-salvar" style="background: var(--amarelo); color: var(--bg-dark); margin-top: 15px;" onclick="adicionarVaga()">
            <i class="fas fa-plus"></i> Adicionar Vaga
        </button>

        <div class="table-box" style="margin-top: 30px;">
            <table class="exec-table">
                <thead>
                    <tr>
                        <th style="color: var(--text-dim);">Cargo</th>
                        <th style="color: var(--text-dim);">Setor</th>
                        <th style="text-align: center; color: var(--text-dim);">Qtd</th>
                        <th style="text-align: right; color: var(--text-dim);">Ação</th>
                    </tr>
                </thead>
                <tbody id="tabela-vagas-lancamento"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // Função acionada pelo botão "Incluir no Calendário"
    window.adicionarEventoCalendario = function() {
        const selectTipo = document.getElementById('novo-evento-tipo');
        let tipo = selectTipo.value;
        const dataStr = document.getElementById('novo-evento-data').value;
        const textarea = document.getElementById('input-calendario-rh');

        if (!dataStr) {
            alert("Por favor, selecione a data do evento!");
            return;
        }

        // Se o usuário selecionar "OUTRO", pede para digitar o nome
        if (tipo === 'OUTRO') {
            const nomePersonalizado = prompt("Digite o nome do evento:");
            if (!nomePersonalizado || nomePersonalizado.trim() === '') return; 
            tipo = nomePersonalizado.toUpperCase();
        }

        // O valor do input date vem no formato "YYYY-MM-DD"
        const partes = dataStr.split('-');
        const dia = partes[2]; // Pega apenas o dia (ex: 05)
        
        const novoTexto = `Dia ${dia} - ${tipo}`;

        // Insere o texto na caixa
        if (textarea.value.trim() === '') {
            textarea.value = novoTexto;
        } else {
            textarea.value += '\n' + novoTexto; // Quebra de linha para não juntar
        }

        // Limpa o campo de data para o próximo lançamento
        document.getElementById('novo-evento-data').value = '';
    };

    setTimeout(function() {
        if (typeof window.carregarDadosRH === 'function') {
            window.carregarDadosRH();
        }
    }, 100);
</script>
