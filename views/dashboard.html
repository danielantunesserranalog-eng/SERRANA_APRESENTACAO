<div class="cards-grid">
    <div class="stat-card">
        <div class="stat-card-header">
            <div class="stat-card-title">MÉDIA PBTC (Mês Atual)</div>
            <i class="fas fa-weight-hanging"></i>
        </div>
        <div class="stat-card-value" id="indicador-pbtc">
            <span id="pbtc-valor">78.1</span> <small>ton</small>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="pbtc-barra" style="width: 100%;"></div></div>
        <small style="color: var(--text-muted);">Meta Ideal: 74 a 77.7</small>
    </div>

    <div class="stat-card">
        <div class="stat-card-header">
            <div class="stat-card-title">CICLO MÉDIO DE VIAGEM</div>
            <i class="fas fa-stopwatch"></i>
        </div>
        <div class="stat-card-value semaforo-verde">
            <span>2.4</span> <small>horas</small>
        </div>
        <div class="progress-bar"><div class="progress-fill bg-verde" style="width: 100%;"></div></div>
        <small style="color: var(--text-muted);">Meta: < 3.0 horas</small>
    </div>
</div>

<script>
    // Lógica do Semáforo Automático da Média PBTC (Puxando a lógica exigida)
    (function() {
        const valorPBTC = parseFloat(document.getElementById('pbtc-valor').innerText);
        const textElement = document.getElementById('indicador-pbtc');
        const barElement = document.getElementById('pbtc-barra');
        
        if (valorPBTC < 74) {
            textElement.classList.add('semaforo-amarelo');
            barElement.classList.add('bg-amarelo');
        } else if (valorPBTC >= 74 && valorPBTC <= 77.7) {
            textElement.classList.add('semaforo-verde');
            barElement.classList.add('bg-verde');
        } else {
            textElement.classList.add('semaforo-vermelho');
            barElement.classList.add('bg-vermelho');
        }
    })();
</script>
