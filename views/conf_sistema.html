<div class="dashboard-grid">
    <div class="kpi-card" style="grid-column: 1 / -1;">
        <h3 class="nav-label" style="margin-bottom: 25px; font-size: 1rem;"><i class="fas fa-users-cog"></i> RESPONSÁVEIS PELA APRESENTAÇÃO</h3>
        <div class="form-grid">
            <div class="input-group"><label>Diretoria / Geral</label><input type="text" id="resp_geral" class="config-input"></div>
            <div class="input-group"><label>RH</label><input type="text" id="resp_rh" class="config-input"></div>
            <div class="input-group"><label>Operacional</label><input type="text" id="resp_operacional" class="config-input"></div>
            <div class="input-group"><label>Manutenção</label><input type="text" id="resp_manutencao" class="config-input"></div>
            <div class="input-group"><label>SSMA</label><input type="text" id="resp_ssma" class="config-input"></div>
        </div>
        <button class="btn-salvar" onclick="salvarNomes()"><i class="fas fa-save"></i> Salvar</button>
        <span id="msg-salvo" style="color: var(--verde); display: none; margin-left: 15px;">Salvo!</span>
    </div>
</div>
<script>
    ['geral','rh','operacional','manutencao','ssma'].forEach(s => {
        document.getElementById('resp_'+s).value = localStorage.getItem('resp_'+s) || '';
    });
    function salvarNomes() {
        ['geral','rh','operacional','manutencao','ssma'].forEach(s => {
            localStorage.setItem('resp_'+s, document.getElementById('resp_'+s).value);
        });
        document.getElementById('msg-salvo').style.display = 'inline';
        setTimeout(() => document.getElementById('msg-salvo').style.display = 'none', 2000);
    }
</script>
