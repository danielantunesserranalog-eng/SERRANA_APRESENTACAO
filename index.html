<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serrana Florestal | Apresentação Executiva</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./css/style.css">
    
    <!-- Bibliotecas de Gráficos e Renderização -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>

    <!-- ================= TELA DE ABERTURA (SPLASH SCREEN) ================= -->
    <div id="splash-screen" class="splash-screen">
        <div class="splash-content">
            <img src="./assets/logo.png" alt="Serrana Florestal" class="splash-logo" onerror="this.src='./assets/logoverde.png'">
            <h1 class="splash-title">REUNIÃO DIÁRIA DE ALINHAMENTO</h1>
            
            <!-- A data será preenchida automaticamente pelo JavaScript -->
            <div class="splash-date" id="splash-date"></div>

            <button class="btn-iniciar-reuniao" onclick="iniciarReuniao()">
                <i class="fas fa-play-circle"></i> INICIAR REUNIÃO
            </button>
        </div>
    </div>
    <!-- ==================================================================== -->

    <div class="presentation-container">
        <aside class="sidebar" id="sidebar">
            <div class="logo-area">
                <img src="./assets/logo.png" alt="Serrana" class="main-logo" onerror="this.src='./assets/logoverde.png'">
            </div>
            
            <nav class="nav-menu">
                <div class="nav-label">MENUS DE APONTAMENTO</div>
                <ul id="menu-list"></ul>
                <div style="margin-top: 20px; border-top: 1px solid var(--border); padding-top: 20px;">
                    <ul id="config-menu-list"></ul>
                </div>
            </nav>
            <div class="sidebar-footer">
                <div class="status-box">
                    <span class="dot online"></span>
                    <span>SISTEMA LOCAL ATIVO</span>
                </div>
                <div id="clock" class="clock"></div>
            </div>
        </aside>
        
        <main class="main-display">
            <header class="display-header">
                <div class="header-info">
                    <button id="toggle-menu" class="btn-icon"><i class="fas fa-bars"></i></button>
                    <div class="title-group">
                        <h1 id="current-sector-title">Aguardando Início...</h1>
                        <p id="current-sector-subtitle">Módulo de Lançamento e Apresentação</p>
                    </div>
                </div>
                
                <div class="header-actions">
                    <select id="filter-date" class="top-select">
                        <option value="d-1" selected>D-1 (Ontem)</option>
                        <option value="d-7">D-7 (Semana)</option>
                        <option value="d-30">D-30 (Mês)</option>
                    </select>
                    <div class="presenter-badge">
                        <i class="fas fa-user-tie"></i>
                        <span>Responsável: <strong id="presenter-name">-</strong></span>
                    </div>
                </div>
            </header>
            
            <section id="content-area" class="content-area"></section>
        </main>
    </div>

    <!-- Scripts da Aplicação e Conexões com Banco -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./js/config_db.js"></script>
    <script src="./js/app.js"></script>
    <script src="./js/os_painel.js"></script>
</body>
</html>
