<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="description" content="Dashboard Serrana - Apresentação de setores para reuniões diárias">
    <title>Serrana | Dashboard de Setores</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,100;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <style>
        /* Reset e Variáveis Globais */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: #111827;
            --bg-card: #1f2937;
            --bg-hover: #374151;
            --text-primary: #ffffff;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            --accent-primary: #3b82f6;
            --accent-secondary: #10b981;
            --accent-warning: #f59e0b;
            --accent-danger: #ef4444;
            --accent-purple: #8b5cf6;
            --border-color: #374151;
            --success: #10b981;
            --info: #3b82f6;
            --gradient-1: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --gradient-2: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --gradient-3: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow: hidden;
        }

        /* Layout Principal */
        .app-container {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            left: 0;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .logo-container {
            padding: 2rem 1.5rem;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 1.5rem;
        }

        .logo {
            max-width: 180px;
            width: 100%;
            height: auto;
            margin: 0 auto;
            transition: all 0.3s ease;
        }

        .logo-container .company-name {
            display: none;
        }

        /* Menu */
        .nav-menu {
            flex: 1;
            padding: 0 1rem;
        }

        .menu-title {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 1rem;
            padding-left: 1rem;
        }

        .menu-list {
            list-style: none;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.75rem 1rem;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: var(--text-secondary);
            margin-bottom: 0.25rem;
            position: relative;
        }

        .menu-item:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
            transform: translateX(5px);
        }

        .menu-item.active {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.1), rgba(139, 92, 246, 0.1));
            color: var(--accent-primary);
        }

        .menu-item i:first-child {
            width: 24px;
        }

        .has-submenu {
            cursor: pointer;
        }

        .submenu-toggle {
            margin-left: auto;
            transition: transform 0.3s ease;
            font-size: 0.75rem;
        }

        .has-submenu.open .submenu-toggle {
            transform: rotate(90deg);
        }

        .submenu {
            margin-left: 2rem;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }

        .submenu.open {
            max-height: 500px;
        }

        .submenu-item {
            padding: 0.5rem 1rem 0.5rem 2.5rem;
            font-size: 0.8rem;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            margin-left: 280px;
            overflow-y: auto;
            background: var(--bg-primary);
        }

        /* Top Bar */
        .top-bar {
            background: rgba(17, 24, 39, 0.95);
            backdrop-filter: blur(10px);
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 90;
            border-bottom: 1px solid var(--border-color);
        }

        .page-title h1 {
            font-size: 1.875rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
            background: linear-gradient(135deg, #fff 0%, #9ca3af 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .page-title p {
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .refresh-btn {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
            font-size: 0.875rem;
        }

        .refresh-btn:hover {
            background: var(--accent-primary);
            transform: translateY(-2px);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: var(--bg-card);
            border-radius: 8px;
            font-size: 0.875rem;
        }

        /* Dashboard Content */
        .dashboard-content {
            padding: 2rem;
        }

        /* Cards */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 1.5rem;
            transition: all 0.3s ease;
            border: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--gradient-1);
        }

        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .stat-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .stat-card-header i {
            font-size: 2rem;
            opacity: 0.6;
        }

        .stat-card-title {
            color: var(--text-secondary);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-card-value {
            font-size: 1.75rem;
            font-weight: 700;
            margin-top: 0.5rem;
        }

        .stat-card-value small {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-left: 0.5rem;
        }

        .progress-bar {
            background: var(--bg-primary);
            height: 6px;
            border-radius: 3px;
            overflow: hidden;
            margin-top: 1rem;
        }

        .progress-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 1s ease;
        }

        /* Charts */
        .charts-container {
            display: grid;
            grid-template-columns: 1fr 0.6fr;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .chart-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 1.5rem;
            border: 1px solid var(--border-color);
        }

        .chart-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .chart-canvas {
            width: 100%;
            height: 280px;
        }

        .kpi-chart-wrapper {
            max-width: 260px;
            margin: 0 auto;
        }

        .kpi-chart-wrapper canvas {
            max-height: 200px !important;
        }

        /* Tables */
        .table-container {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 1.5rem;
            border: 1px solid var(--border-color);
            overflow-x: auto;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
        }

        .data-table th,
        .data-table td {
            padding: 0.75rem;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        .data-table th {
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
        }

        /* Badges */
        .kpi-indicator {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .kpi-success {
            background: rgba(16, 185, 129, 0.2);
            color: var(--success);
        }

        .kpi-warning {
            background: rgba(245, 158, 11, 0.2);
            color: var(--accent-warning);
        }

        .kpi-danger {
            background: rgba(239, 68, 68, 0.2);
            color: var(--accent-danger);
        }

        /* Forms */
        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        .form-input,
        .form-select,
        .form-textarea {
            width: 100%;
            padding: 0.75rem;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.875rem;
        }

        .form-input:focus,
        .form-select:focus,
        .form-textarea:focus {
            outline: none;
            border-color: var(--accent-primary);
        }

        .btn-primary {
            background: var(--accent-primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        .btn-secondary {
            background: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        /* Config Section */
        .config-section {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid var(--border-color);
        }

        .config-title {
            font-size: 1.125rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid var(--border-color);
        }

        /* Sidebar Footer */
        .sidebar-footer {
            padding: 1.5rem;
            border-top: 1px solid var(--border-color);
            margin-top: auto;
        }

        .date-time {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-align: center;
        }

        .status-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 0.5rem;
        }

        .status-online {
            background: var(--success);
            box-shadow: 0 0 5px var(--success);
        }

        /* Loading */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 400px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-color);
            border-top-color: var(--accent-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Menu Toggle */
        .menu-toggle {
            display: none;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 0.5rem;
            border-radius: 8px;
            cursor: pointer;
            margin-right: 1rem;
            transition: all 0.3s ease;
        }

        /* Overlay */
        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 99;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-primary);
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .dashboard-content > * {
            animation: fadeInUp 0.5s ease-out;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .charts-container {
                grid-template-columns: 1fr;
            }
            .kpi-chart-wrapper {
                max-width: 280px;
            }
        }

        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                transition: transform 0.3s ease;
                position: fixed;
                z-index: 1000;
            }
            .sidebar.mobile-open {
                transform: translateX(0);
            }
            .main-content {
                margin-left: 0;
            }
            .top-bar {
                padding: 1rem;
            }
            .page-title h1 {
                font-size: 1.25rem;
            }
            .dashboard-content {
                padding: 1rem;
            }
            .cards-grid {
                grid-template-columns: 1fr;
                gap: 1rem;
            }
            .menu-toggle {
                display: block;
            }
            .sidebar-overlay.active {
                display: block;
            }
        }

        @media (max-width: 640px) {
            .cards-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Ripple Effect */
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            width: 100px;
            height: 100px;
            margin-top: -50px;
            margin-left: -50px;
            animation: ripple-animation 0.6s ease-out;
            pointer-events: none;
        }

        @keyframes ripple-animation {
            from {
                transform: scale(0);
                opacity: 0.5;
            }
            to {
                transform: scale(4);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Overlay para mobile -->
        <div class="sidebar-overlay" id="sidebar-overlay"></div>
        
        <!-- Sidebar Left Menu -->
        <aside class="sidebar" id="sidebar">
            <div class="logo-container">
                <img src="assets/logo.png" alt="Serrana Logo" class="logo" id="company-logo" onerror="this.src='https://via.placeholder.com/180x60?text=SERRANA'">
            </div>
            
            <nav class="nav-menu">
                <div class="menu-title">
                    <i class="fas fa-th-large" style="margin-right: 0.5rem;"></i>
                    SETORES
                </div>
                <ul class="menu-list" id="menu-list">
                    <!-- Menu será gerado dinamicamente -->
                </ul>
            </nav>
            
            <div class="sidebar-footer">
                <div style="margin-bottom: 1rem;">
                    <span class="status-indicator status-online"></span>
                    <span style="font-size: 0.75rem;">Sistema Online</span>
                </div>
                <div class="date-time" id="current-date-time"></div>
                <div style="margin-top: 1rem; font-size: 0.625rem; color: var(--text-muted);">
                    <i class="fas fa-chart-line"></i> v2.0.0
                </div>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="top-bar">
                <div style="display: flex; align-items: center;">
                    <button class="menu-toggle" id="menu-toggle" aria-label="Abrir menu">
                        <i class="fas fa-bars"></i>
                    </button>
                    <div class="page-title">
                        <h1 id="setor-title">Dashboard</h1>
                        <p id="setor-subtitle">Visão geral do setor</p>
                    </div>
                </div>
                <div class="header-controls">
                    <button class="refresh-btn" id="refresh-btn" data-tooltip="Atualizar dados">
                        <i class="fas fa-sync-alt"></i>
                        <span>Atualizar</span>
                    </button>
                    <div class="user-info">
                        <i class="fas fa-user-circle"></i>
                        <span>Reunião Diária</span>
                    </div>
                </div>
            </header>

            <div class="dashboard-content" id="dashboard-content">
                <div class="loading">
                    <div class="spinner"></div>
                    <span style="margin-left: 1rem;">Carregando dashboard...</span>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script>
        // ==================== CONFIGURAÇÃO DO MENU ====================
        const menuConfig = [
            {
                id: 'rh',
                nome: 'RH',
                icone: 'fas fa-users',
                cor: '#3b82f6',
                submenus: [
                    { id: 'rh_indicadores', nome: 'Indicadores', acao: 'carregarIndicadores' },
                    { id: 'rh_funcionarios', nome: 'Funcionários', acao: 'carregarFuncionarios' },
                    { id: 'rh_treinamentos', nome: 'Treinamentos', acao: 'carregarTreinamentos' }
                ]
            },
            {
                id: 'operacional',
                nome: 'OPERACIONAL',
                icone: 'fas fa-chart-line',
                cor: '#10b981',
                submenus: [
                    { id: 'op_producao', nome: 'Produção', acao: 'carregarProducao' },
                    { id: 'op_eficiencia', nome: 'Eficiência', acao: 'carregarEficiencia' },
                    { id: 'op_entregas', nome: 'Entregas', acao: 'carregarEntregas' }
                ]
            },
            {
                id: 'manutencao',
                nome: 'MANUTENÇÃO',
                icone: 'fas fa-tools',
                cor: '#f59e0b',
                submenus: [
                    { id: 'man_ordens', nome: 'Ordens de Serviço', acao: 'carregarOrdens' },
                    { id: 'man_preventiva', nome: 'Preventiva', acao: 'carregarPreventiva' },
                    { id: 'man_equipamentos', nome: 'Equipamentos', acao: 'carregarEquipamentos' }
                ]
            },
            {
                id: 'ssma',
                nome: 'SSMA',
                icone: 'fas fa-shield-alt',
                cor: '#8b5cf6',
                submenus: [
                    { id: 'ssma_indicadores', nome: 'Indicadores', acao: 'carregarIndicadoresSSMA' },
                    { id: 'ssma_treinamentos', nome: 'Treinamentos', acao: 'carregarTreinamentosSSMA' },
                    { id: 'ssma_auditorias', nome: 'Auditorias', acao: 'carregarAuditorias' }
                ]
            },
            {
                id: 'consideracoes',
                nome: 'CONSIDERAÇÕES FINAIS',
                icone: 'fas fa-clipboard-list',
                cor: '#ef4444',
                submenus: [
                    { id: 'cons_resumo', nome: 'Resumo', acao: 'carregarResumo' },
                    { id: 'cons_metas', nome: 'Metas', acao: 'carregarMetas' },
                    { id: 'cons_acoes', nome: 'Próximas Ações', acao: 'carregarAcoes' }
                ]
            },
            {
                id: 'configuracoes',
                nome: 'CONFIGURAÇÕES',
                icone: 'fas fa-cog',
                cor: '#6b7280',
                submenus: [
                    { id: 'conf_geral', nome: 'Geral', acao: 'carregarConfigGeral' },
                    { id: 'conf_usuarios', nome: 'Usuários', acao: 'carregarConfigUsuarios' },
                    { id: 'conf_setores', nome: 'Setores', acao: 'carregarConfigSetores' },
                    { id: 'conf_backup', nome: 'Backup', acao: 'carregarConfigBackup' }
                ]
            }
        ];

        // ==================== TEMPLATES DOS MÓDULOS ====================
        function getTemplate(setorId, submenuId) {
            const key = `${setorId}_${submenuId}`;
            const templates = {
                // RH Templates
                rh_rh_indicadores: `
                    <div class="cards-grid">
                        <div class="stat-card"><div class="stat-card-header"><div class="stat-card-title">COLABORADORES</div><i class="fas fa-users"></i></div><div class="stat-card-value">247 <small>meta: 250</small></div><div class="progress-bar"><div class="progress-fill" style="width: 98%; background: #3b82f6;"></div></div></div>
                        <div class="stat-card"><div class="stat-card-header"><div class="stat-card-title">TURNOVER</div><i class="fas fa-exchange-alt"></i></div><div class="stat-card-value">2.8% <small>meta: 3.0%</small></div><div class="progress-bar"><div class="progress-fill" style="width: 93%; background: #10b981;"></div></div></div>
                        <div class="stat-card"><div class="stat-card-header"><div class="stat-card-title">TREINAMENTOS</div><i class="fas fa-chalkboard-user"></i></div><div class="stat-card-value">89% <small>meta: 95%</small></div><div class="progress-bar"><div class="progress-fill" style="width: 94%; background: #f59e0b;"></div></div></div>
                        <div class="stat-card"><div class="stat-card-header"><div class="stat-card-title">ABSENTEÍSMO</div><i class="fas fa-calendar-times"></i></div><div class="stat-card-value">3.2% <small>meta: 3.5%</small></div><div class="progress-bar"><div class="progress-fill" style="width: 91%; background: #8b5cf6;"></div></div></div>
                    </div>
                    <div class="charts-container">
                        <div class="chart-card"><div class="chart-title"><i class="fas fa-chart-line"></i> Evolução de Colaboradores</div><canvas id="rhEvolucaoChart" class="chart-canvas"></canvas></div>

            return templates[key] || `<div style="text-align:center;padding:3rem;"><i class="fas fa-chart-line" style="font-size:3rem;"></i><h2>${submenuId}</h2><p>Conteúdo em desenvolvimento</p></div>`;

        // ==================== FUNÇÕES DE CARREGAMENTO ====================
        let currentCharts = {};

        function destroyCharts() {
            Object.values(currentCharts).forEach(chart => {
                if (chart && typeof chart.destroy === 'function') chart.destroy();
            });
            currentCharts = {};
        }

        function loadModuleContent(setorId, submenuId) {
            const container = document.getElementById('dashboard-content');
            if (!container) return;
            
            container.innerHTML = `<div class="loading"><div class="spinner"></div><span>Carregando...</span></div>`;
            
            setTimeout(() => {
                const html = getTemplate(setorId, submenuId);
                container.innerHTML = html;
                destroyCharts();
                initializeChartsForTemplate(setorId, submenuId);
            }, 300);
        }

        function initializeChartsForTemplate(setorId, submenuId) {
            const key = `${setorId}_${submenuId}`;
            
            // RH Charts
            if (key === 'rh_rh_indicadores') {
                const ctx1 = document.getElementById('rhEvolucaoChart')?.getContext('2d');
                const ctx2 = document.getElementById('rhDepartamentoChart')?.getContext('2d');
                if (ctx1) currentCharts.rhEvolucao = new Chart(ctx1, { type: 'line', data: { labels: ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun'], datasets: [{ label: 'Colaboradores', data: [220, 230, 235, 240, 245, 247], borderColor: '#3b82f6', tension: 0.4 }] }, options: { responsive: true } });
                if (ctx2) currentCharts.rhDepartamento = new Chart(ctx2, { type: 'doughnut', data: { labels: ['Operacional', 'RH', 'Manutenção', 'SSMA'], datasets: [{ data: [120, 45, 52, 30], backgroundColor: ['#10b981', '#3b82f6', '#f59e0b', '#8b5cf6'] }] }, options: { responsive: true, plugins: { legend: { position: 'bottom', labels: { color: '#fff', font: { size: 10 } } } } } });
            }
            
            // Operacional Charts
            if (key === 'operacional_op_producao') {
                const ctx1 = document.getElementById('producaoDiariaChart')?.getContext('2d');
                const ctx2 = document.getElementById('producaoLinhaChart')?.getContext('2d');
                if (ctx1) currentCharts.producaoDiaria = new Chart(ctx1, { type: 'bar', data: { labels: ['Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'], datasets: [{ label: 'Produção', data: [2100, 2350, 2280, 2450, 2580, 1860], backgroundColor: '#3b82f6' }] }, options: { responsive: true } });
                if (ctx2) currentCharts.producaoLinha = new Chart(ctx2, { type: 'doughnut', data: { labels: ['Linha A', 'Linha B', 'Linha C'], datasets: [{ data: [45, 35, 20], backgroundColor: ['#3b82f6', '#10b981', '#f59e0b'] }] }, options: { responsive: true, plugins: { legend: { position: 'bottom', labels: { color: '#fff', font: { size: 10 } } } } } });

            if (key === 'operacional_op_eficiencia') {
                const ctx = document.getElementById('eficienciaChart')?.getContext('2d');

            // SSMA Charts
            if (key === 'ssma_ssma_indicadores') {
                const ctx1 = document.getElementById('acidentesChart')?.getContext('2d');
                const ctx2 = document.getElementById('ssmaTipoChart')?.getContext('2d');
                if (ctx1) currentCharts.acidentes = new Chart(ctx1, { type: 'line', data: { labels: ['Jul', 'Ago', 'Set', 'Out', 'Nov', 'Dez'], datasets: [{ label: 'Acidentes', data: [2, 1, 0, 0, 0, 0], borderColor: '#ef4444' }] }, options: { responsive: true } });
                if (ctx2) currentCharts.ssmaTipo = new Chart(ctx2, { type: 'doughnut', data: { labels: ['Segurança', 'Saúde', 'Meio Ambiente'], datasets: [{ data: [60, 25, 15], backgroundColor: ['#3b82f6', '#10b981', '#8b5cf6'] }] }, options: { responsive: true, plugins: { legend: { position: 'bottom', labels: { color: '#fff', font: { size: 10 } } } } } });

            // Considerações Charts
            if (key === 'consideracoes_cons_resumo') {
                const ctx1 = document.getElementById('performanceGeralChart')?.getContext('2d');

                if (ctx2) currentCharts.metasDist = new Chart(ctx2, { type: 'doughnut', data: { labels: ['Atingidas', 'Em andamento', 'Não iniciadas'], datasets: [{ data: [65, 25, 10], backgroundColor: ['#10b981', '#f59e0b', '#ef4444'] }] }, options: { responsive: true, plugins: { legend: { position: 'bottom', labels: { color: '#fff', font: { size: 10 } } } } } });

        // ==================== FUNÇÕES DE NAVEGAÇÃO ====================
        const navigationFunctions = {};
        
        menuConfig.forEach(setor => {
            setor.submenus.forEach(sub => {
                navigationFunctions[sub.acao] = () => loadModuleContent(setor.id, sub.id);
            });
        });
        
        window.carregarIndicadores = navigationFunctions.carregarIndicadores;
        window.carregarFuncionarios = navigationFunctions.carregarFuncionarios;
        window.carregarTreinamentos = navigationFunctions.carregarTreinamentos;
        window.carregarProducao = navigationFunctions.carregarProducao;
        window.carregarEficiencia = navigationFunctions.carregarEficiencia;
        window.carregarEntregas = navigationFunctions.carregarEntregas;
        window.carregarOrdens = navigationFunctions.carregarOrdens;
        window.carregarPreventiva = navigationFunctions.carregarPreventiva;

        window.carregarResumo = navigationFunctions.carregarResumo;
        window.carregarMetas = navigationFunctions.carregarMetas;

        window.carregarConfigUsuarios = navigationFunctions.carregarConfigUsuarios;
        window.carregarConfigSetores = navigationFunctions.carregarConfigSetores;
        window.carregarConfigBackup = navigationFunctions.carregarConfigBackup;
        window.loadModuleContent = loadModuleContent;

        // ==================== RENDERIZAR MENU ====================
        function renderMenu() {
            const menuList = document.getElementById('menu-list');
            if (!menuList) return;
            
            menuList.innerHTML = '';
            
            menuConfig.forEach(item => {
                const li = document.createElement('li');
                li.className = 'menu-item has-submenu';
                li.setAttribute('data-setor', item.id);
                
                li.innerHTML = `
                    <i class="${item.icone}" style="color: ${item.cor}"></i>
                    <span>${item.nome}</span>
                    <i class="fas fa-chevron-right submenu-toggle" style="margin-left: auto; font-size: 0.75rem;"></i>
                `;
                
                const submenuUl = document.createElement('ul');
                submenuUl.className = 'submenu';
                
                item.submenus.forEach(sub => {
                    const subLi = document.createElement('li');
                    subLi.className = 'submenu-item menu-item';
                    subLi.setAttribute('data-submenu', sub.id);
                    subLi.innerHTML = `
                        <i class="fas fa-circle" style="font-size: 0.5rem; width: 20px; color: ${item.cor}"></i>
                        <span>${sub.nome}</span>
                    `;
                    subLi.addEventListener('click', (e) => {
                        e.stopPropagation();
                        if (navigationFunctions[sub.acao]) navigationFunctions[sub.acao]();
                        document.querySelectorAll('.menu-item.active').forEach(el => el.classList.remove('active'));
                        subLi.classList.add('active');
                    });
                    submenuUl.appendChild(subLi);
                });
                
                li.appendChild(submenuUl);
                li.addEventListener('click', (e) => {
                    if (e.target === li || e.target.classList.contains('submenu-toggle') || e.target.parentElement === li) {
                        li.classList.toggle('open');
                        submenuUl.classList.toggle('open');
                    }
                });
                menuList.appendChild(li);
            });
        }

        // ==================== DATA E HORA ====================
        function updateDateTime() {
            const now = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' };
            const dateTimeElement = document.getElementById('current-date-time');
            if (dateTimeElement) dateTimeElement.textContent = now.toLocaleDateString('pt-BR', options);
        }

        // ==================== MOBILE MENU ====================
        function initMobileMenu() {
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            
            if (menuToggle) menuToggle.addEventListener('click', () => { sidebar.classList.toggle('mobile-open'); overlay.classList.toggle('active'); });
            if (overlay) overlay.addEventListener('click', () => { sidebar.classList.remove('mobile-open'); overlay.classList.remove('active'); });
            window.addEventListener('resize', () => { if (window.innerWidth > 768) { sidebar.classList.remove('mobile-open'); overlay.classList.remove('active'); } });
        }

        // ==================== REFRESH BUTTON ====================
        function initRefreshButton() {
            const refreshBtn = document.getElementById('refresh-btn');
            if (refreshBtn) {
                refreshBtn.addEventListener('click', () => {
                    const activeSubmenu = document.querySelector('.submenu-item.active');
                    if (activeSubmenu) {
                        const setorLi = activeSubmenu.closest('.has-submenu');
                        const setorId = setorLi?.getAttribute('data-setor');
                        const submenuId = activeSubmenu.getAttribute('data-submenu');
                        if (setorId && submenuId) loadModuleContent(setorId, submenuId);
                    }
                });
            }
        }

        // ==================== RIPPLE EFFECT ====================
        function initRippleEffect() {
            document.addEventListener('click', function(e) {
                const button = e.target.closest('.menu-item, .refresh-btn, .btn-primary');
                if (button) {
                    const ripple = document.createElement('span');
                    ripple.classList.add('ripple');
                    const rect = button.getBoundingClientRect();
                    ripple.style.left = `${e.clientX - rect.left}px`;
                    ripple.style.top = `${e.clientY - rect.top}px`;
                    button.style.position = 'relative';
                    button.style.overflow = 'hidden';
                    button.appendChild(ripple);
                    setTimeout(() => ripple.remove(), 600);
                }
            });
        }

        // ==================== INICIALIZAÇÃO ====================
        document.addEventListener('DOMContentLoaded', () => {
            renderMenu();
            updateDateTime();
            setInterval(updateDateTime, 1000);
            initMobileMenu();
            initRefreshButton();
            initRippleEffect();
            
            setTimeout(() => {
                const primeiroSubmenu = document.querySelector('.submenu-item');
                if (primeiroSubmenu) primeiroSubmenu.click();
            }, 500);
        });
    </script>
