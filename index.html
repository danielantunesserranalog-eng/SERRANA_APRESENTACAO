<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serrana Florestal | Apresentação Executiva</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./css/style.css">
    
    <!-- Bibliotecas de Gráficos e Renderização -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>

    <!-- ================= TELA DE ABERTURA (SPLASH SCREEN) ================= -->
    <div id="splash-screen" class="splash-screen">
        
        <!-- Animação do Caminhão Tritrem Florestal (Detalhado) -->
        <div class="splash-animation-container">
            <svg class="tritrem-svg" viewBox="0 0 900 150" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <!-- Roda detalhada com aro -->
                    <g id="roda">
                        <circle cx="0" cy="0" r="14" fill="currentColor" opacity="0.9"/>
                        <circle cx="0" cy="0" r="7" fill="#0f172a"/> <!-- Cor do fundo para vazar o aro -->
                        <circle cx="0" cy="0" r="3" fill="currentColor"/>
                    </g>
                    
                    <!-- Fueiro (Haste lateral) -->
                    <g id="fueiro">
                        <rect x="0" y="0" width="4" height="50" fill="currentColor" opacity="0.8"/>
                    </g>

                    <!-- Conjunto de Toras de Eucalipto -->
                    <g id="carga-toras">
                        <!-- Camada fundo (mais clara para profundidade) -->
                        <rect x="2" y="38" width="146" height="10" rx="4" fill="currentColor" opacity="0.4"/>
                        <rect x="0" y="28" width="150" height="10" rx="4" fill="currentColor" opacity="0.5"/>
                        <rect x="4" y="18" width="142" height="10" rx="4" fill="currentColor" opacity="0.3"/>
                        <!-- Camada frente (mais escura) -->
                        <rect x="5" y="32" width="140" height="12" rx="5" fill="currentColor" opacity="0.8"/>
                        <rect x="2" y="20" width="146" height="12" rx="5" fill="currentColor" opacity="0.9"/>
                        <rect x="8" y="8" width="134" height="12" rx="5" fill="currentColor" opacity="0.7"/>
                    </g>

                    <!-- Molde de uma Carreta Padrão -->
                    <g id="carreta">
                        <use href="#carga-toras" x="5" y="10"/>
                        <use href="#fueiro" x="15" y="10"/>
                        <use href="#fueiro" x="55" y="10"/>
                        <use href="#fueiro" x="95" y="10"/>
                        <use href="#fueiro" x="135" y="10"/>
                        <rect x="0" y="60" width="160" height="8" fill="currentColor" opacity="1"/>
                        <use href="#roda" x="35" y="75"/>
                        <use href="#roda" x="125" y="75"/>
                    </g>
                </defs>

                <g fill="currentColor">
                    <!-- 3ª Carreta -->
                    <use href="#carreta" x="10" y="30"/>
                    <rect x="170" y="94" width="30" height="4" opacity="0.6"/> <!-- Engate -->

                    <!-- 2ª Carreta -->
                    <use href="#carreta" x="200" y="30"/>
                    <rect x="360" y="94" width="30" height="4" opacity="0.6"/> <!-- Engate -->

                    <!-- 1ª Carreta -->
                    <use href="#carreta" x="390" y="30"/>
                    <rect x="550" y="94" width="20" height="4" opacity="0.6"/> <!-- Engate no Cavalo -->

                    <!-- Cavalo Mecânico (Caminhão Florestal) -->
                    <g transform="translate(570, 30)">
                        <rect x="0" y="60" width="130" height="8" opacity="1"/> <!-- Chassi Traseiro -->
                        
                        <!-- Cabine Principal -->
                        <path d="M 50 0 L 80 0 L 80 20 L 50 20 Z" opacity="0.6"/> <!-- Aerofólio -->
                        <path d="M 50 20 L 85 20 L 105 45 L 130 45 L 135 60 L 50 60 Z" opacity="0.9"/> <!-- Corpo -->
                        <path d="M 55 25 L 80 25 L 95 42 L 55 42 Z" fill="#0f172a" opacity="0.8"/> <!-- Parabrisa Lateral -->
                        
                        <rect x="40" y="-10" width="6" height="70" opacity="0.7"/> <!-- Escapamento Vertical -->
                        <rect x="125" y="48" width="10" height="10" opacity="0.4"/> <!-- Grade Frontal / Farol -->
                        
                        <!-- Eixos do Cavalo (Tração dupla e Direcional) -->
                        <use href="#roda" x="20" y="75"/>
                        <use href="#roda" x="55" y="75"/>
                        <use href="#roda" x="115" y="75"/>
                    </g>

                    <!-- Efeitos de Linha de Velocidade (Vento) -->
                    <rect x="800" y="100" width="60" height="2" opacity="0.3"/>
                    <rect x="750" y="115" width="30" height="2" opacity="0.2"/>
                    <rect x="850" y="75" width="40" height="2" opacity="0.4"/>
                </g>
            </svg>
        </div>

        <!-- Conteúdo Central -->
        <div class="splash-content">
            <img src="./assets/logo.png" alt="Serrana Florestal" class="splash-logo" onerror="this.src='./assets/logoverde.png'">
            <h1 class="splash-title">REUNIÃO DIÁRIA DE ALINHAMENTO</h1>
            
            <div class="splash-date" id="splash-date"></div>

            <button class="btn-iniciar-reuniao" onclick="iniciarReuniao()">
                <i class="fas fa-play-circle"></i> INICIAR REUNIÃO
            </button>
        </div>
    </div>
    <!-- ==================================================================== -->

    <div class="presentation-container">
        <aside class="sidebar" id="sidebar">
            <div class="logo-area">
                <img src="./assets/logo.png" alt="Serrana" class="main-logo" onerror="this.src='./assets/logoverde.png'">
            </div>
            
            <nav class="nav-menu">
                <div class="nav-label">MENUS DE APONTAMENTO</div>
                <ul id="menu-list"></ul>
                <div style="margin-top: 20px; border-top: 1px solid var(--border); padding-top: 20px;">
                    <ul id="config-menu-list"></ul>
                </div>
            </nav>
            <div class="sidebar-footer">
                <div class="status-box">
                    <span class="dot online"></span>
                    <span>SISTEMA LOCAL ATIVO</span>
                </div>
                <div id="clock" class="clock"></div>
            </div>
        </aside>
        
        <main class="main-display">
            <header class="display-header">
                <div class="header-info">
                    <button id="toggle-menu" class="btn-icon"><i class="fas fa-bars"></i></button>
                    <div class="title-group">
                        <h1 id="current-sector-title">Aguardando Início...</h1>
                        <p id="current-sector-subtitle">Módulo de Lançamento e Apresentação</p>
                    </div>
                </div>
                
                <div class="header-actions">
                    <select id="filter-date" class="top-select">
                        <option value="d-1" selected>D-1 (Ontem)</option>
                        <option value="d-7">D-7 (Semana)</option>
                        <option value="d-30">D-30 (Mês)</option>
                    </select>
                    <div class="presenter-badge">
                        <i class="fas fa-user-tie"></i>
                        <span>Responsável: <strong id="presenter-name">-</strong></span>
                    </div>
                </div>
            </header>
            
            <section id="content-area" class="content-area"></section>
        </main>
    </div>

    <!-- Scripts da Aplicação e Conexões com Banco -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./js/config_db.js"></script>
    <script src="./js/app.js"></script>
    <script src="./js/os_painel.js"></script>
</body>
</html>
